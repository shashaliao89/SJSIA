services:
  postgres:
    image: postgres:16-alpine
    container_name: sjsia-portal-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sjsia_portal
    volumes:
      - sjsia_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sjsia_portal"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  sjsia_pgdata:
